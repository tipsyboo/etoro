{{- if .Values.keda.enabled -}}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "simple-web.fullname" . }}
  labels:
    {{- include "simple-web.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "simple-web.fullname" . }}
  minReplicaCount: {{ .Values.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.maxReplicas }}
  triggers:
    # 1. CPU Trigger
    - type: cpu
      metadata:
        type: Utilization
        value: {{ .Values.autoscaling.targetCPUUtilizationPercentage | quote }}
    # 2. Memory Trigger
    - type: memory
      metadata:
        type: Utilization
        value: {{ .Values.autoscaling.targetMemoryUtilizationPercentage | quote }}
    # 3. Cron Schedule Trigger (8:00 AM to 12:00 AM)
    - type: cron
      metadata:
        timezone: Asia/Jerusalem
        start: "0 8 * * *"
        end: "0 0 * * *"
        desiredReplicas: "3"
{{- end }}
